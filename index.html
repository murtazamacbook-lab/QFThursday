// ── SCORING RULES ────────────────────────────────────────────────
// ✅ Correct result: 5 pts
// ⚽ Each correct goal: 5 pts
// 🎯 Exact score bonus: 5 pts
// 🔄 Correct draw: 15 pts (instead of result pts)
// 🏆 Correct advancing team (QF winner): 20 pts
const SCORE_CORRECT_RESULT = 5;
const SCORE_PER_GOAL = 5;
const SCORE_EXACT_BONUS = 5;
const SCORE_CORRECT_DRAW = 15;
const SCORE_QF_WINNER = 20;
function computeScore(pred, actual) {
  // pred/actual: {h, a, pk?}  — pk = penalty shootout winner name
  if (!pred || pred.h == null || pred.h === '' || !actual || actual.h == null || actual.h === '') return 0;
  const pH = parseInt(pred.h),
    pA = parseInt(pred.a);
  const aH = parseInt(actual.h),
    aA = parseInt(actual.a);
  if (isNaN(pH) || isNaN(pA) || isNaN(aH) || isNaN(aA)) return 0;
  let pts = 0;
  const aRes = aH > aA ? 'H' : aA > aH ? 'A' : 'D';
  const pRes = pH > pA ? 'H' : pA > pH ? 'A' : 'D';

  // Correct result (or draw)
  if (aRes === pRes) {
    pts += aRes === 'D' ? SCORE_CORRECT_DRAW : SCORE_CORRECT_RESULT;
  }
  // Per-goal accuracy
  if (pH === aH) pts += SCORE_PER_GOAL;
  if (pA === aA) pts += SCORE_PER_GOAL;
  // Exact score bonus
  if (pH === aH && pA === aA) pts += SCORE_EXACT_BONUS;
  // QF winner (advancing team)
  const actualWinner = aH > aA ? MATCH.homeTeam : aA > aH ? MATCH.awayTeam : actual.pkWinner || null;
  const predWinner = pH > pA ? MATCH.homeTeam : pA > pH ? MATCH.awayTeam : pred.pk || null;
  if (actualWinner && predWinner && actualWinner === predWinner) pts += SCORE_QF_WINNER;
  return pts;
}

const hashPin = async (pin, username = '') => {
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(username + '::' + String(pin) + '::qft'));

  } catch {
    return String(pin);
  }
};

        return val;
      }
    } catch {}
    return cached;
  }
};

const formatMatchTime = raw => {
  if (!raw) return {
    time: 'TBD',
    date: '',
    local: false
  };
  const d = new Date(raw);
  if (isNaN(d)) return {
    time: raw,
    date: '',
    local: false
  };
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const isTomorrow = d.toDateString() === new Date(now.getTime() + 86400000).toDateString();
  const timeStr = d.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });
  const dateLabel = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : d.toLocaleDateString([], {
    weekday: 'short',
    month: 'short',
    day: 'numeric'
  });
  return {
    time: timeStr,
    date: dateLabel,
    local: true
  };
};
