const SCORE_CORRECT_RESULT = 5;

const parseMinSec = t => {
  if (!t) return null;
  const [m, s] = (t || '').split(':').map(Number);
  return isNaN(m) || isNaN(s) ? null : m * 60 + s;
};

// Compute pts from goal-time/scorer/card detail predictions against admin-entered live goals
function computeGoalDetailPts(pred = {}, lg = {}) {
  if (!lg) return {
    total: 0,
    items: []
  };
  let pts = 0;
  const items = [];
  const used = new Set(); // prevent double-counting same predicted slot
  (lg.goals || []).forEach((g, gi) => {
    const actualSecs = parseMinSec(g.time);
    if (actualSecs == null) return;
    const predGoals = g.isHome ? pred.hGoals || [] : pred.aGoals || [];
    let minDiff = Infinity,
      bestIdx = -1;
    predGoals.forEach((pg, i) => {
      if (used.has((g.isHome ? 'h' : 'a') + i)) return;
      const s = parseMinSec(pg.time);
      if (s == null) return;
      const d = Math.abs(s - actualSecs);
      if (d < minDiff) {
        minDiff = d;
        bestIdx = i;
      }
    });
    if (bestIdx >= 0) {
      used.add((g.isHome ? 'h' : 'a') + bestIdx);
      const tp = minDiff <= 300 ? SCORE_GOAL_TIME_5 : minDiff <= 600 ? SCORE_GOAL_TIME_10 : 0;
      if (tp > 0) {
        pts += tp;
        items.push({
          label: `⏱ ${g.isHome ? 'Home' : 'Away'} goal ${gi + 1} time (±${minDiff < 60 ? minDiff + 's' : Math.round(minDiff / 60) + 'm'})`,
          pts: tp
        });
      }
      const ps = (predGoals[bestIdx]?.scorer || '').toLowerCase().trim();
      const as_ = (g.scorer || '').toLowerCase().trim();
      if (ps && as_ && ps === as_) {
        pts += SCORE_GOAL_SCORER;
        items.push({
          label: `⚽ Scorer: ${g.scorer}`,
          pts: SCORE_GOAL_SCORER
        });
      }
    }
  });
  const ac = lg.cards || {};
  const pc = pred.cards || {};
  [['hY', 'Home 🟨'], ['hR', 'Home 🟥'], ['aY', 'Away 🟨'], ['aR', 'Away 🟥']].forEach(([k, label]) => {
    if (ac[k] != null && pc[k] !== '' && pc[k] != null && parseInt(pc[k]) === parseInt(ac[k])) {
      pts += SCORE_CARDS_RIGHT;
      items.push({
        label: `Cards: ${label} correct`,
        pts: SCORE_CARDS_RIGHT
      });
    }
  });
  return {
    total: pts,
    items
  };
}
function computeScore(pred, actual, home, away) {
  if (!pred || pred.h == null || pred.h === '' || !actual || actual.h == null || actual.h === '') return {
    total: 0,
    correctResult: false,
    exactScore: false,
    correctGoals: 0,
    winnerCorrect: false
  };
  const pH = parseInt(pred.h),
    pA = parseInt(pred.a),
    aH = parseInt(actual.h),
    aA = parseInt(actual.a);
  if (isNaN(pH) || isNaN(pA) || isNaN(aH) || isNaN(aA)) return {
    total: 0,
    correctResult: false,
    exactScore: false,
    correctGoals: 0,
    winnerCorrect: false
  };
  let pts = 0;
  const aRes = aH > aA ? 'H' : aA > aH ? 'A' : 'D',
    pRes = pH > pA ? 'H' : pA > pH ? 'A' : 'D';
  const correctResult = aRes === pRes;
  if (correctResult) pts += aRes === 'D' ? SCORE_CORRECT_DRAW : SCORE_CORRECT_RESULT;
  let correctGoals = 0;
  if (pH === aH) {
    pts += SCORE_PER_GOAL;
    correctGoals++;
  }
  if (pA === aA) {
    pts += SCORE_PER_GOAL;
    correctGoals++;
  }
  const exactScore = pH === aH && pA === aA;
  if (exactScore) pts += SCORE_EXACT_BONUS;
  const actualWinner = aH > aA ? home : aA > aH ? away : actual.pkWinner || null;
  const predWinner = pH > pA ? home : pA > pH ? away : pred.pk || null;
  const winnerCorrect = !!(actualWinner && predWinner && actualWinner === predWinner);
  if (winnerCorrect) pts += SCORE_QF_WINNER;
  return {
    total: pts,
    correctResult,
    exactScore,
    correctGoals,
    winnerCorrect
  };
}

const hashPin = async (pin, username = '') => {
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(username + '::' + String(pin) + '::qft'));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  } catch {
    return String(pin);
  }
};

// ── STORAGE ───────────────────────────────────────────────────────
const lsGet = k => {
  try {
    const v = localStorage.getItem('qft_' + k);
    return v ? JSON.parse(v) : null;
  } catch {
    return null;
  }
};
const lsSet = (k, v) => {
  try {
    localStorage.setItem('qft_' + k, JSON.stringify(v));
  } catch {}
};
const fbTO = (p, ms = 8000) => Promise.race([p, new Promise((_, r) => setTimeout(() => r(new Error('timeout')), ms))]);
const storage = {
  // Write whole-doc blob (participants, pins, result, teams, etc.)
  async set(key, value) {
    lsSet(key, value);
    if (!FB_ON) return;
    return fbTO(db.collection(NS).doc(key).set({
      value: JSON.stringify(value)
    })).catch(e => console.warn('[qft] write failed:', key, e));
  },
  // Read whole-doc blob
  async get(key) {
    const c = lsGet(key);
    if (!FB_ON) return c;
    try {
      const s = await fbTO(db.collection(NS).doc(key).get());
      if (s.exists) {
        const v = JSON.parse(s.data().value || 'null');
        lsSet(key, v);
        return v;
      }
    } catch (e) {
      console.warn('[qft] read failed:', key, e);
    }
    return c;
  },
  // Per-user merge write — prevents race conditions when multiple users save simultaneously
  async setUserField(key, userName, value) {
    const cache = lsGet(key) || {};
    lsSet(key, {
      ...cache,
      [userName]: value
    });
    if (!FB_ON) return;
    return fbTO(db.collection(NS).doc(key).set({
      [userName]: JSON.stringify(value)
    }, {
      merge: true
    })).catch(e => console.warn('[qft] user-field write failed:', key, userName, e));
  },
  // Read per-user field doc → object map {userName: value} — supports both legacy blob and new field format
  async getUserMap(key) {
    const c = lsGet(key) || {};
    if (!FB_ON) return c;
    try {
      const s = await fbTO(db.collection(NS).doc(key).get());
      if (s.exists) {
        const data = s.data() || {};
        const map = {};
        if (data.value) {
          try {
            Object.assign(map, JSON.parse(data.value));
          } catch {}
        } // legacy blob support
        Object.entries(data).filter(([k]) => k !== 'value').forEach(([k, v]) => {
          try {
            map[k] = JSON.parse(v);
          } catch {}
        });
        lsSet(key, map);
        return map;
      }
    } catch (e) {
      console.warn('[qft] user-map read failed:', key, e);
    }
    return c;
  }
};
